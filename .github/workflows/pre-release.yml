name: Pre-Release (Alpha/Beta)

on:
  push:
    tags:
      - 'v*-alpha.*'
      - 'v*-beta.*'
      - 'v*-rc.*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/glean

jobs:
  build-backend:
    name: Build Backend Image (Pre-release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}-{{prerelease}}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    name: Build Worker Image (Pre-release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}-{{prerelease}}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web Frontend Image (Pre-release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}-{{prerelease}}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-admin:
    name: Build Admin Dashboard Image (Pre-release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-admin
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}-{{prerelease}}

      - name: Build and push Admin image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/apps/admin/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Pre-Release
    needs: [build-backend, build-worker, build-web, build-admin]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect release type
        id: release_type
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-alpha."* ]]; then
            echo "type=Alpha" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-beta."* ]]; then
            echo "type=Beta" >> $GITHUB_OUTPUT
            echo "emoji=🧪" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-rc."* ]]; then
            echo "type=Release Candidate" >> $GITHUB_OUTPUT
            echo "emoji=🚀" >> $GITHUB_OUTPUT
          else
            echo "type=Pre-release" >> $GITHUB_OUTPUT
            echo "emoji=🔬" >> $GITHUB_OUTPUT
          fi

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          name: "${{ steps.release_type.outputs.emoji }} ${{ github.ref_name }} (${{ steps.release_type.outputs.type }})"
          body: |
            ## ${{ steps.release_type.outputs.emoji }} This is a ${{ steps.release_type.outputs.type }}

            > **Warning**: This is a pre-release version intended for testing purposes only.
            > Do not use in production environments.

            ## Docker Images

            This pre-release includes the following Docker images:

            ```bash
            # Pull images
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}-worker:${{ github.ref_name }}
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}-web:${{ github.ref_name }}
            docker pull ghcr.io/${{ env.IMAGE_PREFIX }}-admin:${{ github.ref_name }}
            ```

            ## Testing with Docker Compose

            Create a `docker-compose.override.yml` file:

            ```yaml
            version: '3.8'

            services:
              backend:
                image: ghcr.io/${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}

              worker:
                image: ghcr.io/${{ env.IMAGE_PREFIX }}-worker:${{ github.ref_name }}

              web:
                image: ghcr.io/${{ env.IMAGE_PREFIX }}-web:${{ github.ref_name }}

              admin:
                image: ghcr.io/${{ env.IMAGE_PREFIX }}-admin:${{ github.ref_name }}
            ```

            Then run:

            ```bash
            docker compose up -d
            ```

            ## Feedback

            Found an issue? Please report it at:
            https://github.com/${{ github.repository }}/issues

            ---

            ## Changelog

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
