# Override file for local development builds
# Usage: docker compose up -d (automatically uses docker-compose.yml + docker-compose.override.yml)
# Or: docker compose -f docker-compose.full.yml -f docker-compose.override.yml up -d
#
# This override uses separate test volumes to avoid conflicts with dev database.
# To completely reset test data: docker compose down -v

services:
  postgres:
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis_test_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: glean-backend:local
    pull_policy: never
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.tuna.tsinghua.edu.cn}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: glean-backend:local
    pull_policy: never
    mem_limit: ${WORKER_MEMORY_LIMIT:-2g}
    mem_reservation: ${WORKER_MEMORY_RESERVATION:-1g}
    shm_size: ${WORKER_SHM_SIZE:-256m}

  admin:
    build:
      context: ./frontend
      dockerfile: apps/admin/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com/}
    image: glean-admin:local
    pull_policy: never

  web:
    build:
      context: ./frontend
      dockerfile: apps/web/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com/}
    image: glean-web:local
    pull_policy: never

volumes:
  postgres_test_data:
  redis_test_data:
