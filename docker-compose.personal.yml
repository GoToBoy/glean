services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: glean-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glean}
      POSTGRES_USER: ${POSTGRES_USER:-glean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glean}
    command: >
      postgres
      -c logging_collector=off
      -c log_min_duration_statement=1000
      -c log_line_prefix='%t [%p] %u@%d '
      -c log_statement=none
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glean}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glean-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:8-alpine
    container_name: glean-redis
    command: >
      redis-server
      --appendonly yes
      --loglevel notice
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glean-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  mtranserver:
    image: xxnuo/mtranserver
    container_name: glean-mtranserver
    ports:
      - "${MTRAN_PORT:-5001}:5001"
      - "${MTRAN_UI_PORT:-8989}:8989"
    networks:
      - glean-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    image: ghcr.io/gotoboy/glean-backend:${IMAGE_TAG:-latest}
    container_name: glean-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-glean}:${POSTGRES_PASSWORD:-glean}@postgres:5432/${POSTGRES_DB:-glean}
      REDIS_URL: redis://redis:6379/0
      MTRAN_SERVER_URL: ${MTRAN_SERVER_URL:-http://mtranserver:5001}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      CORS_ORIGINS: '["http://localhost", "http://localhost:3000", "http://localhost:3001"]'
      DEBUG: ${DEBUG:-false}
      RUN_MIGRATIONS: "true"
      CREATE_ADMIN: ${CREATE_ADMIN:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_ROLE: ${ADMIN_ROLE:-super_admin}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${API_LOG_FILE:-/app/logs/glean-api.log}
      LOG_ERROR_FILE: ${API_LOG_ERROR_FILE:-/app/logs/glean-api.error.log}
      LOG_ROTATION: ${LOG_ROTATION:-100 MB}
      LOG_RETENTION: ${LOG_RETENTION:-30 days}
      LOG_COMPRESSION: ${LOG_COMPRESSION:-gz}
      LOG_SERIALIZE: ${LOG_SERIALIZE:-false}
    volumes:
      - ${LOGS_DIR:-./logs}:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - glean-network
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "uvicorn", "glean_api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  worker:
    image: ghcr.io/gotoboy/glean-worker:${IMAGE_TAG:-latest}
    container_name: glean-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-glean}:${POSTGRES_PASSWORD:-glean}@postgres:5432/${POSTGRES_DB:-glean}
      REDIS_URL: redis://redis:6379/0
      MTRAN_SERVER_URL: ${MTRAN_SERVER_URL:-http://mtranserver:5001}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      WORKER_JOB_TIMEOUT_SECONDS: ${WORKER_JOB_TIMEOUT_SECONDS:-1800}
      WORKER_MAX_JOBS: ${WORKER_MAX_JOBS:-4}
      BROWSER_EXTRACTION_ENABLED: ${BROWSER_EXTRACTION_ENABLED:-true}
      BROWSER_EXTRACTION_TIMEOUT_SECONDS: ${BROWSER_EXTRACTION_TIMEOUT_SECONDS:-20}
      BROWSER_EXTRACTION_MAX_CONCURRENCY: ${BROWSER_EXTRACTION_MAX_CONCURRENCY:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${WORKER_LOG_FILE:-/app/logs/glean-worker.log}
      LOG_ERROR_FILE: ${WORKER_LOG_ERROR_FILE:-/app/logs/glean-worker.error.log}
      LOG_ROTATION: ${LOG_ROTATION:-100 MB}
      LOG_RETENTION: ${LOG_RETENTION:-30 days}
      LOG_COMPRESSION: ${LOG_COMPRESSION:-gz}
      LOG_SERIALIZE: ${LOG_SERIALIZE:-false}
    volumes:
      - ${LOGS_DIR:-./logs}:/app/logs
    mem_limit: ${WORKER_MEMORY_LIMIT:-2g}
    mem_reservation: ${WORKER_MEMORY_RESERVATION:-1g}
    shm_size: ${WORKER_SHM_SIZE:-256m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - glean-network
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "python", "scripts/run-arq-worker.py", "glean_worker.main.WorkerSettings"]
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  web:
    image: ghcr.io/gotoboy/glean-web:${IMAGE_TAG:-latest}
    container_name: glean-web
    ports:
      - "${WEB_PORT:-8800}:80"
    volumes:
      - ${LOGS_DIR:-./logs}/nginx-web:/app/logs/nginx
    depends_on:
      - backend
    networks:
      - glean-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  admin:
    image: ghcr.io/gotoboy/glean-admin:${IMAGE_TAG:-latest}
    container_name: glean-admin
    ports:
      - "${ADMIN_PORT:-3001}:80"
    volumes:
      - ${LOGS_DIR:-./logs}/nginx-admin:/app/logs/nginx
    depends_on:
      - backend
    networks:
      - glean-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:

networks:
  glean-network:
    driver: bridge
